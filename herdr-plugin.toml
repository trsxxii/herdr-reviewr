id = "reviewr"
name = "reviewr"
version = "0.1.0"
min_herdr_version = "0.7.0"
platforms = ["macos", "linux"]
description = "Native terminal code-review sidebar for herdr."

# Installs the `herdr-review` binary to ~/.cargo/bin on `herdr plugin install`; skipped by
# `herdr plugin link` (install it yourself with `cargo install --path .`).
[[build]]
command = ["cargo", "install", "--path", "."]

# The sidebar pane runs the reviewr binary by name (resolved on PATH, since the pane's cwd is
# the repo under review, not the plugin root); the toggle action places it as a right split.
[[panes]]
id = "sidebar"
title = "reviewr"
placement = "split"
command = ["herdr-review"]

[[actions]]
id = "toggle"
title = "reviewr: toggle sidebar"
contexts = ["pane", "workspace"]
command = ["bash", "herdr/sidebar.sh", "toggle"]

# Auto-open the sidebar for a freshly created worktree.
[[events]]
on = "worktree.created"
command = ["bash", "herdr/sidebar.sh", "open"]

