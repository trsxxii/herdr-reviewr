id = "persiyanov.reviewr"
name = "reviewr"
version = "0.22.0"
min_herdr_version = "0.7.0"
platforms = ["macos", "linux"]
description = "Review agent-written diffs beside the chat and add line comments to the agent input."

# On `herdr plugin install`, download the prebuilt `herdr-reviewr` binary for this platform from
# the matching GitHub Release into $HERDR_PLUGIN_ROOT/bin (no Rust toolchain needed). Skipped by
# `herdr plugin link` — for a local checkout, build it yourself with `cargo install --path .`.
[[build]]
command = ["bash", "herdr/install.sh"]

# The sidebar pane runs the downloaded binary by absolute path under the plugin root, since the
# pane's cwd is the repo under review (not the plugin root) and the binary isn't on PATH. The
# toggle action's placement is configurable (default: right split); see herdr/sidebar.sh.
[[panes]]
id = "sidebar"
title = "reviewr"
placement = "split"
command = ["sh", "-c", "exec \"$HERDR_PLUGIN_ROOT/bin/herdr-reviewr\""]

[[actions]]
id = "toggle"
title = "reviewr: toggle sidebar"
contexts = ["pane", "workspace"]
command = ["bash", "herdr/sidebar.sh", "toggle"]

[[actions]]
id = "open"
title = "reviewr: open sidebar"
contexts = ["pane", "workspace"]
command = ["bash", "herdr/sidebar.sh", "open"]

[[actions]]
id = "close"
title = "reviewr: close sidebar"
contexts = ["pane", "workspace"]
command = ["bash", "herdr/sidebar.sh", "close"]

# Auto-open the sidebar for a freshly created worktree (gated by auto_open; see herdr/sidebar.sh).
[[events]]
on = "worktree.created"
command = ["bash", "herdr/sidebar.sh", "auto-open"]
