name: release

# Build prebuilt binaries for each supported platform and attach them to the GitHub Release
# whenever a v* tag is pushed. herdr/install.sh downloads the matching asset on plugin install.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # A tag push creates no Release object on its own, and the upload action below uploads to an
  # existing release — so create it first (idempotent), and have the matrix depend on it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create the release if it doesn't exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "herdr-reviewr $GITHUB_REF_NAME" --verify-tag --generate-notes

  binaries:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
    steps:
      - uses: actions/checkout@v5

      # Builds herdr-reviewr for the target (cross-compiling aarch64 Linux via `cross` as needed),
      # archives it as herdr-reviewr-<target>.tar.gz with a .sha256 sidecar, and uploads both to
      # the release for this tag. The toolchain is pinned by rust-toolchain.toml.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: herdr-reviewr
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
