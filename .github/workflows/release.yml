name: release

# Build prebuilt binaries for each supported platform and attach them to the GitHub Release
# whenever a v* tag is pushed. herdr/install.sh downloads the matching asset on plugin install.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  # Sigstore-signed build provenance for every release asset, verifiable by anyone via
  # `gh attestation verify <asset> --repo persiyanov/herdr-reviewr`.
  id-token: write
  attestations: write

jobs:
  # A tag push creates no Release object on its own, and the upload action below uploads to an
  # existing release — so create it first (idempotent), and have the matrix depend on it.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # The release body is the tag's CHANGELOG.md section, so the page a human lands on says
      # what changed. The action parses the Keep-a-Changelog format and fails when the tag has
      # no section, so a forgotten changelog entry fails the release instead of shipping the
      # bare compare link. Idempotent: an existing release is left as is.
      # Draft until the binaries attach: the repo publishes immutable releases, which refuse
      # asset uploads after publish — so publish is the pipeline's last step, not its first.
      - uses: taiki-e/create-gh-release-action@v1
        with:
          changelog: CHANGELOG.md
          title: herdr-reviewr $version
          draft: true
          token: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    needs: create-release
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin, os: macos-latest }
          - { target: x86_64-apple-darwin, os: macos-latest }
          - { target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
    steps:
      - uses: actions/checkout@v7

      # Builds herdr-reviewr for the target (cross-compiling aarch64 Linux via `cross` as needed),
      # archives it as herdr-reviewr-<target>.tar.gz with a .sha256 sidecar, and uploads both to
      # the release for this tag. The toolchain is pinned by rust-toolchain.toml.
      - uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: herdr-reviewr
          target: ${{ matrix.target }}
          archive: $bin-$target
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}

      # The archive the step above built and uploaded gets a signed provenance attestation.
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: herdr-reviewr-${{ matrix.target }}.tar.gz

  # Publish once every target's assets are attached. Publishing seals an immutable release,
  # so this runs last; a failed target leaves the draft for inspection instead of shipping a
  # release that installs 404.
  publish:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - run: gh release edit "$GITHUB_REF_NAME" --draft=false --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
